dotfiles_path: "{{ lookup('env', 'DOTFILES_PATH') | default(lookup('env', 'HOME') + '/dotfiles', true) }}"

home: "{{ ansible_env.HOME }}"
# ansible_facts["architecture"] replaces deprecated ansible_architecture
homebrew_prefix: "{{ '/opt/homebrew' if ansible_facts['architecture'] == 'arm64' else '/usr/local' }}"
homebrew_bin: "{{ homebrew_prefix }}/bin"

target_shell: "{{ homebrew_bin }}/nu"

homebrew_packages:
  - git
  - zoxide
  - carapace
  - starship
  - nushell
  - zellij
  - mise
  - ripgrep
  - fzf
  - fd
  - bat
  - eza
  - neovim
  - watchman
  # - tmux  # uncomment if you want tmux managed by Ansible

homebrew_casks:
  - ghostty

mise_tools:
  node: "lts"
  rust: "latest"
  ruby: "3.3"
  java: "temurin-21"
  # gradle: "latest"  # uncomment if needed
