- name: Ensure starship config directory exists
  file:
    path: "{{ lookup('env', 'HOME') }}/.config/starship"
    state: directory

- name: Symlink starship config
  file:
    src: "{{ dotfiles_path }}/.config/starship"
    dest: "{{ lookup('env', 'HOME') }}/.config/starship"
    state: link
    force: true

# STARSHIP_CONFIG is now handled in dotfiles/.config/nushell/env.nu
# No additional configuration needed here
