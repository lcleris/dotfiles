- name: Check we are running on macOS
  fail:
    msg: "This playbook is designed for macOS only (detected: {{ ansible_system }})"
  when: ansible_system != "Darwin"

- name: Create essential config directories
  file:
    path: "{{ home }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - .config
    - .cache/starship
    - .cache/carapace
    - .local/bin

- name: Ensure global .gitignore excludes .DS_Store
  lineinfile:
    path: "{{ home }}/.gitignore_global"
    line: ".DS_Store"
    create: true

- name: Configure git to use the global .gitignore
  community.general.git_config:
    name: core.excludesfile
    scope: global
    value: "{{ home }}/.gitignore_global"
