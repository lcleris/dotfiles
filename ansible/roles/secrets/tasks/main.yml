- name: Charger la liste des secrets à provisionner
  include_vars: vars/main.yml

- name: Vérifier quels secrets existent déjà dans le Keychain
  command: >
    security find-generic-password
    -a "{{ ansible_env.USER }}"
    -s "{{ item.service }}"
    -w
  register: keychain_check
  loop: "{{ keychain_secrets }}"
  loop_control:
    label: "{{ item.service }}"
  failed_when: false
  changed_when: false
  no_log: true

- name: Stocker les secrets manquants dans le Keychain
  block:
    - name: Demander les secrets manquants
      pause:
        prompt: |

          ━━━ Secret manquant : {{ item.item.service }} ━━━
          {{ item.item.description }}
          Valeur (sera stockée dans le Keychain macOS, jamais en clair)
      register: secret_input
      loop: "{{ keychain_check.results }}"
      loop_control:
        label: "{{ item.item.service }}"
      when: item.rc != 0
      no_log: true

    - name: Enregistrer dans le Keychain
      command: >
        security add-generic-password
        -a "{{ ansible_env.USER }}"
        -s "{{ item.item.item.service }}"
        -w "{{ item.user_input }}"
        -U
      loop: "{{ secret_input.results }}"
      loop_control:
        label: "{{ item.item.item.service }}"
      when:
        - item.user_input is defined
        - item.user_input | length > 0
      no_log: true

- name: Supprimer le fichier secrets.nu existant
  file:
    path: "{{ ansible_env.HOME }}/.config/nushell/secrets.nu"
    state: absent

- name: Symlink secrets.nu → dotfiles
  file:
    src: "{{ dotfiles_path }}/.config/nushell/secrets.nu"
    dest: "{{ ansible_env.HOME }}/.config/nushell/secrets.nu"
    state: link
    force: true

- name: Vérification finale — secrets dans le Keychain
  command: >
    security find-generic-password
    -a "{{ ansible_env.USER }}"
    -s "{{ item.service }}"
    -w
  register: final_check
  loop: "{{ keychain_secrets }}"
  loop_control:
    label: "{{ item.service }}"
  failed_when: false
  changed_when: false
  no_log: true

- name: Résumé des secrets
  debug:
    msg: "{{ item.item.service }} → {{ '✓ présent dans le Keychain' if item.rc == 0 else '✗ manquant' }}"
  loop: "{{ final_check.results }}"
  loop_control:
    label: "{{ item.item.service }}"
