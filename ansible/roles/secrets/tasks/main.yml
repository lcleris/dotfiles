- name: Load secrets list
  include_vars: vars/main.yml

- name: Check which secrets already exist in Keychain
  command: >
    security find-generic-password
    -a "{{ ansible_facts['env']['USER'] }}"
    -s "{{ item.service }}"
    -w
  register: keychain_check
  loop: "{{ keychain_secrets }}"
  loop_control:
    label: "{{ item.service }}"
  failed_when: false
  changed_when: false
  no_log: true

- name: Prompt for missing secrets and store in Keychain
  block:
    - name: Prompt for missing values
      pause:
        prompt: |

          ━━━ Missing secret: {{ item.item.service }} ━━━
          {{ item.item.description }}
          Value (will be stored in macOS Keychain, never on disk)
      register: secret_input
      loop: "{{ keychain_check.results }}"
      loop_control:
        label: "{{ item.item.service }}"
      when: item.rc != 0
      no_log: true

    - name: Store in Keychain
      command: >
        security add-generic-password
        -a "{{ ansible_facts['env']['USER'] }}"
        -s "{{ item.item.item.service }}"
        -w "{{ item.user_input }}"
        -U
      loop: "{{ secret_input.results }}"
      loop_control:
        label: "{{ item.item.item.service }}"
      when:
        - item.user_input is defined
        - item.user_input | length > 0
      no_log: true

- name: Final check — verify secrets in Keychain
  command: >
    security find-generic-password
    -a "{{ ansible_facts['env']['USER'] }}"
    -s "{{ item.service }}"
    -w
  register: final_check
  loop: "{{ keychain_secrets }}"
  loop_control:
    label: "{{ item.service }}"
  failed_when: false
  changed_when: false
  no_log: true

- name: Summary
  debug:
    msg: "{{ item.item.service }} → {{ '✓ present in Keychain' if item.rc == 0 else '✗ missing' }}"
  loop: "{{ final_check.results }}"
  loop_control:
    label: "{{ item.item.service }}"
