# Install Nushell and dependencies
- name: Install Nushell via Homebrew
  homebrew:
    name: nushell
    state: present

- name: Install zoxide via Homebrew
  homebrew:
    name: zoxide
    state: present

- name: Install carapace via Homebrew
  homebrew:
    name: carapace
    state: present

# Remove existing symlink if it exists
- name: Remove existing nushell config symlink
  file:
    path: "{{ lookup('env', 'HOME') }}/.config/nushell"
    state: absent

# Create symlink to dotfiles
- name: Symlink Nushell config
  file:
    src: "{{ dotfiles_path }}/.config/nushell"
    dest: "{{ lookup('env', 'HOME') }}/.config/nushell"
    state: link
    force: true

# Create necessary directories
- name: Create starship cache directory
  file:
    path: "{{ lookup('env', 'HOME') }}/.cache/starship"
    state: directory

- name: Create carapace cache directory
  file:
    path: "{{ lookup('env', 'HOME') }}/.cache/carapace"
    state: directory

# Generate initialization files
- name: Generate starship init file
  shell: "/opt/homebrew/bin/starship init nu > {{ lookup('env', 'HOME') }}/.cache/starship/init.nu"
  args:
    creates: "{{ lookup('env', 'HOME') }}/.cache/starship/init.nu"

- name: Generate zoxide init file
  shell: "/opt/homebrew/bin/zoxide init nushell > {{ lookup('env', 'HOME') }}/.zoxide.nu"
  args:
    creates: "{{ lookup('env', 'HOME') }}/.zoxide.nu"

- name: Generate carapace init file
  shell: "/opt/homebrew/bin/carapace _carapace nushell > {{ lookup('env', 'HOME') }}/.cache/carapace/init.nu"
  args:
    creates: "{{ lookup('env', 'HOME') }}/.cache/carapace/init.nu"

# Setup main Nushell configuration files
- name: Ensure Nushell config directory exists
  file:
    path: "{{ lookup('env', 'HOME') }}/Library/Application Support/nushell"
    state: directory

- name: Configure main env.nu to source dotfiles
  copy:
    content: |
      # env.nu
      #
      # Installed by Ansible
      #
      # This file is loaded before config.nu and login.nu
      # Source dotfiles env.nu
      source ~/dotfiles/.config/nushell/env.nu
    dest: "{{ lookup('env', 'HOME') }}/Library/Application Support/nushell/env.nu"
    backup: yes

- name: Configure main config.nu to source dotfiles
  copy:
    content: |
      # config.nu
      #
      # Installed by Ansible
      #
      # This file is loaded after env.nu and before login.nu
      # Source dotfiles config.nu
      source ~/dotfiles/.config/nushell/config.nu
    dest: "{{ lookup('env', 'HOME') }}/Library/Application Support/nushell/config.nu"
    backup: yes

# Set Nushell as default shell
- name: Check current shell
  shell: "echo $SHELL"
  register: current_shell
  changed_when: false

- name: Set Nushell as default shell
  shell: "chsh -s /opt/homebrew/bin/nu"
  when: current_shell.stdout != "/opt/homebrew/bin/nu"
  become: false
