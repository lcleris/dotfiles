- name: Installer Nushell via Homebrew
  homebrew:
    name: nushell
    state: present

- name: Installer les dépendances shell
  homebrew:
    name: "{{ item }}"
    state: present
  loop:
    - zoxide
    - carapace
    - starship

- name: Supprimer le symlink nushell existant
  file:
    path: "{{ home }}/.config/nushell"
    state: absent

- name: Créer le symlink nushell vers dotfiles
  file:
    src: "{{ dotfiles_path }}/.config/nushell"
    dest: "{{ home }}/.config/nushell"
    state: link
    force: true

- name: Créer le répertoire Application Support/nushell
  file:
    path: "{{ home }}/Library/Application Support/nushell"
    state: directory

- name: Créer env.nu principal (source vers dotfiles)
  copy:
    content: source {{ dotfiles_path }}/.config/nushell/env.nu
    dest: "{{ home }}/Library/Application Support/nushell/env.nu"
    backup: true

- name: Créer config.nu principal (source vers dotfiles)
  copy:
    content: source {{ dotfiles_path }}/.config/nushell/config.nu
    dest: "{{ home }}/Library/Application Support/nushell/config.nu"
    backup: true

- name: Créer les répertoires cache
  file:
    path: "{{ home }}/{{ item }}"
    state: directory
  loop:
    - .cache/starship
    - .cache/carapace

- name: Générer l'init starship pour nushell
  shell: "{{ homebrew_bin }}/starship init nu > {{ home }}/.cache/starship/init.nu"
  args:
    creates: "{{ home }}/.cache/starship/init.nu"

- name: Générer l'init zoxide pour nushell
  shell: "{{ homebrew_bin }}/zoxide init nushell > {{ home }}/.zoxide.nu"
  args:
    creates: "{{ home }}/.zoxide.nu"

- name: Générer l'init carapace pour nushell
  shell: "{{ homebrew_bin }}/carapace _carapace nushell > {{ home }}/.cache/carapace/init.nu"
  args:
    creates: "{{ home }}/.cache/carapace/init.nu"

- name: Vérifier le shell courant
  shell: "echo $SHELL"
  register: current_shell
  changed_when: false

- name: Ajouter nushell à /etc/shells si absent
  lineinfile:
    path: /etc/shells
    line: "{{ homebrew_bin }}/nu"
    create: false
  become: true
  when: "homebrew_bin + '/nu' not in current_shell.stdout"

- name: Définir nushell comme shell par défaut
  command: "chsh -s {{ homebrew_bin }}/nu"
  when: current_shell.stdout != homebrew_bin + "/nu"
  become: false
