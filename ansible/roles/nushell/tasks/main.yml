- name: Install NuShell via Homebrew
  homebrew:
    name: nushell
    state: present

- name: Install shell dependencies
  homebrew:
    name: "{{ item }}"
    state: present
  loop:
    - zoxide
    - carapace
    - starship

- name: Create Application Support/nushell directory
  file:
    path: "{{ home }}/Library/Application Support/nushell"
    state: directory

- name: Create env.nu entry point (sources dotfiles)
  copy:
    content: |
      # env.nu — managed by Ansible
      # Sources the real env.nu and secrets from dotfiles
      source {{ dotfiles_path }}/.config/nushell/env.nu
      source {{ dotfiles_path }}/.config/nushell/secrets.nu
    dest: "{{ home }}/Library/Application Support/nushell/env.nu"
    backup: true

- name: Create config.nu entry point (sources dotfiles)
  copy:
    content: |
      # config.nu — managed by Ansible
      # Sources the real config.nu from dotfiles
      source {{ dotfiles_path }}/.config/nushell/config.nu
    dest: "{{ home }}/Library/Application Support/nushell/config.nu"
    backup: true

- name: Create cache directories
  file:
    path: "{{ home }}/{{ item }}"
    state: directory
  loop:
    - .cache/starship
    - .cache/carapace

- name: Generate starship init for nushell
  shell: "{{ homebrew_bin }}/starship init nu > {{ home }}/.cache/starship/init.nu"
  args:
    creates: "{{ home }}/.cache/starship/init.nu"

- name: Generate zoxide init for nushell
  shell: "{{ homebrew_bin }}/zoxide init nushell > {{ home }}/.zoxide.nu"
  args:
    creates: "{{ home }}/.zoxide.nu"

- name: Generate carapace init for nushell
  shell: "{{ homebrew_bin }}/carapace _carapace nushell > {{ home }}/.cache/carapace/init.nu"
  args:
    creates: "{{ home }}/.cache/carapace/init.nu"

- name: Generate mise.nu activation file
  shell: "{{ homebrew_bin }}/mise activate nu > {{ home }}/.config/nushell/mise.nu"
  args:
    creates: "{{ home }}/.config/nushell/mise.nu"

- name: Check current shell
  shell: "echo $SHELL"
  register: current_shell
  changed_when: false

