- name: Check mise is installed
  command: "{{ homebrew_bin }}/mise --version"
  register: mise_version
  failed_when: false
  changed_when: false

- name: Install mise via Homebrew if missing
  homebrew:
    name: mise
    state: present
  when: mise_version.rc != 0

- name: Create mise cache directory
  file:
    path: "{{ home }}/.cache/mise"
    state: directory

- name: Install all tools via mise
  command: "{{ homebrew_bin }}/mise install --yes"
  args:
    chdir: "{{ home }}"
  environment:
    HOME: "{{ home }}"
    PATH: "{{ homebrew_bin }}:{{ ansible_facts['env']['PATH'] }}"
  changed_when: true
