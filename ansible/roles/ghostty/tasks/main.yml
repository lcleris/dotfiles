- name: Check if Ghostty is installed
  stat:
    path: "/Applications/Ghostty.app"
  register: ghostty_app

- name: Install Ghostty via Homebrew Cask
  homebrew_cask:
    name: ghostty
    state: present
  when: not ghostty_app.stat.exists

- name: Create Ghostty config directory
  file:
    path: "{{ home }}/Library/Application Support/com.mitchellh.ghostty"
    state: directory

- name: Remove existing Ghostty config
  file:
    path: "{{ home }}/Library/Application Support/com.mitchellh.ghostty/config"
    state: absent

- name: Symlink Ghostty config → dotfiles
  file:
    src: "{{ dotfiles_path }}/.config/ghostty/config"
    dest: "{{ home }}/Library/Application Support/com.mitchellh.ghostty/config"
    state: link
    force: true
